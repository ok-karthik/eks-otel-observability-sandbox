name: Build and Push to ECR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Permissions required for OIDC federation (recommended best practice)
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  GOLANG_APP_REPO: golang-checkout-service
  PYTHON_APP_REPO: python-payment-service

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==============================================================================
      # Option A: Authenticate using AWS Secrets (Access Key ID & Secret Access Key)
      # ==============================================================================
      - name: Configure AWS Credentials (IAM User Secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ==============================================================================
      # Option B: Authenticate using OIDC Role Federation (Recommended for Production)
      # To use OIDC, comment out Option A, uncomment Option B, and configure the IAM Role.
      # ==============================================================================
      # - name: Configure AWS Credentials (OIDC Role)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push-role
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ==============================================================================
      # Build & Push Go Checkout Service
      # ==============================================================================
      - name: Build and Push Go Checkout Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/golang-app
          file: ./apps/golang-app/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GOLANG_APP_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GOLANG_APP_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==============================================================================
      # Build & Push Python Payment Service
      # ==============================================================================
      - name: Build and Push Python Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/python-app
          file: ./apps/python-app/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PYTHON_APP_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PYTHON_APP_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
