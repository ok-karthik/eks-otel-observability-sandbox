apiVersion: apps/v1
kind: Deployment
metadata:
  name: golang-product-service
  namespace: default
  labels:
    app: golang-product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: golang-product-service
  template:
    metadata:
      labels:
        app: golang-product-service
    spec:
      containers:
        - name: golang-app
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/golang-product-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_INFO_SERVICE_URL
              value: "http://python-app:8001"
            - name: OTEL_SEMCONV_STABILITY_OPT_IN
              value: "http"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.version=1.0.0,deployment.environment=dev"
            - name: PYROSCOPE_SERVER_ADDRESS
              value: "http://pyroscope.monitoring.svc.cluster.local:4040"

            # ==================== EKS Downward API Trick ====================
            # Since Go uses programmatic SDK setup, it needs to know the local
            # DaemonSet agent's endpoint. We use the Downward API to fetch the
            # Node IP (HOST_IP) where this pod is running, and direct our OTLP
            # SDK exporter to talk to that Node IP on port 4317.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector-agent-collector.monitoring.svc.cluster.local:4317"
---
apiVersion: v1
kind: Service
metadata:
  name: golang-app
  namespace: default
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: golang-product-service
