apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-product-info-service
  namespace: default
  labels:
    app: python-product-info-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-product-info-service
  template:
    metadata:
      labels:
        app: python-product-info-service
      annotations:
        # ==================== OTel Auto-Instrumentation Injection ====================
        # This annotation tells the OpenTelemetry Operator to dynamically inject
        # the OTel SDK wrapper into this Python container during pod startup.
        # It references the 'default-instrumentation' Instrumentation CRD we created.
        instrumentation.opentelemetry.io/inject-python: "default-instrumentation"
    spec:
      containers:
        - name: python-app
          image: 508768430433.dkr.ecr.us-east-1.amazonaws.com/python-product-info-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          env:
            - name: OTEL_SERVICE_NAME
              value: "python-product-info-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-agent-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_SEMCONV_STABILITY_OPT_IN
              value: "http"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: PYROSCOPE_SERVER_ADDRESS
              value: "http://pyroscope.monitoring.svc.cluster.local:4040"

---
apiVersion: v1
kind: Service
metadata:
  name: python-app
  namespace: default
spec:
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  selector:
    app: python-product-info-service
