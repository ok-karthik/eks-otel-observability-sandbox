apiVersion: v1
kind: ConfigMap
metadata:
  name: lgtm-dashboards
  namespace: monitoring
data:
  go-service-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 101,
          "title": "Go Golden Signal 1: Latency (P99)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{service_name=\"$service\"}[5m])) by (le)) * 1000",
              "legendFormat": "P99 Latency (ms)",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 102,
          "title": "Go Golden Signal 2: Traffic (Throughput)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_name=\"$service\"}[5m]))",
              "legendFormat": "Requests / sec",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 103,
          "title": "Go Golden Signal 3: Errors (HTTP 5xx Rate)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_name=\"$service\", http_response_status_code=~\"5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{service_name=\"$service\"}[5m])) * 100",
              "legendFormat": "Error Rate %",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 104,
          "title": "Go Golden Signal 4: Saturation (Active Connections / CPU Usage)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum(rate(process_cpu_seconds_total{service_name=\"$service\"}[5m])) * 100",
              "legendFormat": "CPU Saturation %",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "id": 105,
          "title": "Application Logs (Loki)",
          "type": "logs",
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "{service_name=\"$service\"}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "5s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": [
        "golden-signals",
        "go-services"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "value": "golang-checkout"
            },
            "name": "service",
            "query": "label_values(http_server_request_duration_seconds_count, service_name)",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "refresh": 1
          }
        ]
      },
      "title": "Go Golden Signals Service Dashboard (Unified)",
      "version": 2
    }
