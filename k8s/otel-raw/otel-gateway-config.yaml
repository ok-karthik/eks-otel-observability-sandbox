apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: monitoring
data:
  otel-gateway-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      
      # ==================== Redis Receiver (ElastiCache Observability) ====================
      # Scrapes performance metrics natively from the Redis instance running in the cluster.
      redis:
        endpoint: "redis-cache.default.svc.cluster.local:6379"
        collection_interval: 10s

    processors:
      # Memory Limiter protects the collector from crashing on trace spikes
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
        
      # Tail sampling collects all spans of a trace before evaluating rules
      tail_sampling:
        decision_wait: 10s
        num_traces: 10000
        policies:
          # Policy 1: Always keep errors (100% sampling rate)
          - name: keep-errors
            type: status_code
            status_code: { status_codes: [ ERROR ] }
          # Policy 2: Sample HTTP 200/OK at 5% rate to control storage cost
          - name: sample-success
            type: probabilistic
            probabilistic: { sampling_percentage: 5.0 }
            
      batch:
        send_batch_size: 8192
        timeout: 1s

    exporters:
      # Pushes processed/sampled traces directly to Tempo storage
      otlp/tempo:
        endpoint: tempo-distributor.monitoring.svc.cluster.local:4317
        tls:
          insecure: true
          
      # Exposes internal collector, app, and scraped Redis metrics on a Prom scrape endpoint
      prometheus:
        endpoint: 0.0.0.0:8889

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, tail_sampling, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp, redis]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
