apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector-agent
  namespace: monitoring
spec:
  # Runs one collector pod per EKS worker node.
  mode: daemonset
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            
    processors:
      batch:
      
      # The k8sattributes processor calls the K8s API to find the owner pod 
      # of the incoming OTLP IP, adding crucial metadata tags to traces.
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        filter:
          node_from_env_var: K8S_NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.container.name
        pod_association:
          - sources:
              - from: connection  # associates trace by client socket IP address
              
    exporters:
      # Forwards enriched traces up to the centralized Autoscaled Gateway tier
      otlp:
        endpoint: otel-collector-gateway.monitoring.svc.cluster.local:4317
        tls:
          insecure: true
          
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [k8sattributes, batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [k8sattributes, batch]
          exporters: [otlp]
