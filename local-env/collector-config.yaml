receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        
  # ==================== Redis Receiver (ElastiCache Observability) ====================
  # Scrapes performance metrics natively from the Redis instance.
  redis:
    endpoint: "redis-cache:6379"
    collection_interval: 10s

processors:
  batch:
    send_batch_size: 1024
    timeout: 1s

exporters:
  # Internal endpoints in the all-in-one LGTM container
  otlp_http/tempo:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true

  otlp_http/prometheus:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true

  otlp_http/loki:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true

  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/tempo, debug]
    metrics:
      receivers: [otlp, redis]
      processors: [batch]
      exporters: [otlp_http/prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki, debug]
