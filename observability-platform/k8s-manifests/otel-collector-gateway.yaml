apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector-gateway
  namespace: monitoring
spec:
  # Deployment mode enables replica scaling and HPA (Horizontal Pod Autoscaler)
  mode: deployment
  autoscaler:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 80
  image: otel/opentelemetry-collector-contrib:0.109.0

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      
      # Internal receiver for load-balanced traces
      otlp/internal:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4319

    processors:
      # Filter processor to discard noisy low-level HTTP transport spans
      filter/drop_noisy_asgi:
        error_mode: ignore
        traces:
          span:
            - 'IsMatch(name, ".*http send.*")'
            - 'IsMatch(name, ".*http receive.*")'
      filter/lb_health_checks:
        error_mode: ignore
        traces:
          span:
            - 'IsMatch(attributes["user_agent.original"], "ELB-HealthChecker.*")'
            - 'IsMatch(attributes["http.user_agent"], "ELB-HealthChecker.*")'

      # Memory Limiter protects the collector from crashing on trace spikes
      # https://github.com/open-telemetry/opentelemetry-collector/blob/main/processor/memorylimiterprocessor/README.md
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

      # Tail sampling collects all spans of a trace before evaluating rules
      tail_sampling:
        decision_wait: 10s
        num_traces: 10000
        policies:
          # Policy 1: Always keep errors (100% sampling rate)
          - name: keep-errors
            type: status_code
            status_code: { status_codes: [ERROR] }
          # Policy 2: Sample HTTP 200/OK at 100% rate in development
          - name: sample-success
            type: probabilistic
            probabilistic: { sampling_percentage: 100.0 }
          # Policy 3: Keep any trace that takes longer than 2 seconds (2000 ms)
          - name: keep-latency-spikes
            type: latency
            latency: { threshold_ms: 2000 }
          ## Policy 4: Keep services, and discard the rest of services
          #- name: keep-specific-services
          #  type: string_attribute
          #  string_attribute:
          #    {
          #      key: service.name,
          #      values: ["python-product-info-service", "golang-product-service"],
          #    }

      batch:
        send_batch_size: 8192
        timeout: 1s

      # Transform processor using OTTL (OpenTelemetry Transformation Language)
      transform/standardize_http:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # 1. Map http.status_code to http.response.status_code
              - set(attributes["http.response.status_code"], attributes["http.status_code"]) where attributes["http.status_code"] != nil
              - delete_key(attributes, "http.status_code")
              # 2. Map http.method to http.request.method
              - set(attributes["http.request.method"], attributes["http.method"]) where attributes["http.method"] != nil
              - delete_key(attributes, "http.method")
              # 3. Map http.target to url.path
              - set(attributes["url.path"], attributes["http.target"]) where attributes["http.target"] != nil
              - delete_key(attributes, "http.target")
      
      transform/loki_format:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - set(attributes["loki.format"], "raw")

    exporters:
      # Trace affinity load balancer
      loadbalancing:
        routing_key: traceID
        protocol:
          otlp:
            tls:
              insecure: true
        resolver:
          k8s:
            service: otel-collector-gateway-collector
            ports:
              - 4319

      # Pushes metrics to Mimir via Prometheus Remote Write
      prometheusremotewrite:
        endpoint: "http://mimir-distributor.monitoring.svc.cluster.local:8080/api/v1/push"
        headers:
          X-Scope-OrgID: "anonymous"
        resource_to_telemetry_conversion:
          enabled: true
      
      # Pushes traces to Tempo
      otlp/tempo:
        endpoint: "tempo-distributor.monitoring.svc.cluster.local:4317"
        tls:
          insecure: true
          
      # Pushes logs to Loki
      loki:
        endpoint: "http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push"
        format: raw

    service:
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8889
      pipelines:
        # Pipeline 1: Receives traces from NLB and routes them by TraceID to ensure affinity
        traces/routing:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [loadbalancing]

        # Pipeline 2: Receives trace-affinity routed spans and performs tail sampling
        traces:
          receivers: [otlp/internal]
          processors:
            [
              memory_limiter,
              filter/drop_noisy_asgi,
              filter/lb_health_checks,
              transform/standardize_http,
              tail_sampling,
              batch,
            ]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, transform/loki_format, batch]
          exporters: [loki]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-gateway-endpoints-reader
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-gateway-endpoints-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-gateway-endpoints-reader
subjects:
  - kind: ServiceAccount
    name: otel-collector-gateway-collector
    namespace: monitoring
