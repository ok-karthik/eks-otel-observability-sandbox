serviceName: "identity-api"
serviceNamespace: "identity"
serviceVersion: "1.8.0"
environment: "prod"
ownerTeam: "identity-platform"
tenantId: "identity"
language: "dotnet"
slackChannel: "#alerts-identity"

instrumentation:
  mode: "operator"
  annotation: "instrumentation.opentelemetry.io/inject-dotnet"
  instrumentationRef: "dotnet-instrumentation"

resourceAttributes:
  service.name: "identity-api"
  service.namespace: "identity"
  service.version: "1.8.0"
  deployment.environment: "prod"
  team: "identity-platform"
  tenant.id: "identity"

dashboards:
  enabled: true
  template: "dotnet-service"

alerts:
  enabled: true
  latencyP99Ms: 500
  errorRatePercentage: 2
