# ==============================================================================
# OpenTelemetry Gateway Config: Tail-Based Sampling & Telemetry Budgeting
# ==============================================================================
# This configuration demonstrates "Telemetry Budgeting" at the Gateway level.
# In a high-traffic production system (e.g. millions of PlayStation requests/sec),
# storing 100% of HTTP 200 traces is financially wasteful and yields low value.
#
# Tail-based sampling evaluates the entire trace waterfall *after* it completes
# before deciding whether to drop it or store it.
# ==============================================================================

receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  # 1. Rate Limiting: Drop spans if a tenant exceeds their allocated budget per second
  # Note: The `transform` processor or specialized rate_limiting proxies can be used here.
  # For demonstration, we show how you could filter out spans from an abusive tenant.
  filter/budgeting:
    error_mode: ignore
    traces:
      span:
        - 'resource.attributes["tenant.id"] == "abusive-tenant"'

  # 2. Tail Sampling: Intelligently sample traces based on content
  tail_sampling:
    # Wait for 10 seconds to collect all spans belonging to a trace before making a decision
    decision_wait: 10s
    num_traces: 10000
    expected_new_traces_per_sec: 2000
    
    policies:
      # A. Retain 100% of all traces containing an ERROR status code
      - name: drop-errors-policy
        type: status_code
        status_code: 
          status_codes: [ ERROR ]
          
      # B. Retain 100% of HTTP 5xx errors (useful if application status codes aren't set correctly)
      - name: http-5xx-errors
        type: numeric_attribute
        numeric_attribute: 
          key: "http.response.status_code"
          min_value: 500
          max_value: 599

      # C. Retain 100% of slow requests (> 500 milliseconds) for performance bottleneck analysis
      - name: latency-threshold-policy
        type: latency
        latency: 
          threshold_ms: 500

      # D. For normal, healthy transactions (HTTP 200), keep only 5% of them for baseline comparison
      - name: healthy-probabilistic-policy
        type: probabilistic
        probabilistic: 
          sampling_percentage: 5.0

exporters:
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/budgeting, tail_sampling]
      exporters: [otlp]
