apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # AL2023 is the current recommended AMI family for EKS 1.32+
  amiSelectorTerms:
    - alias: al2023@latest
  role: "{{ .Values.karpenterRoleName }}"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "{{ .Values.clusterName }}"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "{{ .Values.clusterName }}"
  tags:
    karpenter.sh/discovery: "{{ .Values.clusterName }}"
